<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>@Glam_findsss | ALL FINDS FROM VIDEOS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    * { font-family: 'Inter', sans-serif; }
    body { background: #000; }

    .card-hover {
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }
    .card-hover:active { transform: scale(0.97); }
    @media (hover: hover) {
      .card-hover:hover {
        transform: translateY(-3px);
        box-shadow: 0 20px 50px rgba(255,255,255,0.12);
      }
    }

    .avatar-ring {
      background: conic-gradient(from 180deg, #e1306c, #fd1d1d, #f56040, #f77737, #fcaf45, #ffdc80, #e1306c);
      padding: 3px;
      border-radius: 9999px;
    }

    .social-btn { transition: transform 0.15s ease, opacity 0.15s ease; }
    .social-btn:hover { transform: scale(1.12); opacity: 0.85; }

    .spreadsheet-bg {
      background-color: #f0f4ff;
      background-image:
        linear-gradient(rgba(37,99,235,0.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(37,99,235,0.08) 1px, transparent 1px);
      background-size: 28px 22px;
    }

    @keyframes pulse-subtle {
      0%, 100% { filter: drop-shadow(0 0 6px rgba(37,144,229,0.6)); }
      50%       { filter: drop-shadow(0 0 14px rgba(37,144,229,0.9)); }
    }
    .tg-icon { animation: pulse-subtle 2.8s ease-in-out infinite; }
    /* Bouncing arrow pointing to top-right */
    @keyframes bounce-up {
      0%, 100% { transform: translateY(0); opacity: 1; }
      50%       { transform: translateY(-8px); opacity: 0.5; }
    }
    .arrow-bounce { animation: bounce-up 0.9s ease-in-out infinite; }

    /* Guide card */
    .guide-card {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 20px;
      padding: 18px 20px;
    }

  </style>
</head>
